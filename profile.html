<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilim | Berlin Konuşuyor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    .profile-hero {
      padding: 140px 5% 60px;
      background: var(--bg-secondary);
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .profile-avatar-large {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      border: 4px solid var(--border-light);
      object-fit: cover;
    }
    .profile-name {
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 8px;
    }
    .profile-email {
      color: var(--text-secondary);
      font-weight: 300;
      margin-bottom: 30px;
    }
    .profile-tabs {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
      border-bottom: 1px solid var(--border);
    }
    .profile-tab {
      padding: 15px 0;
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 500;
      position: relative;
      transition: color 0.3s;
    }
    .profile-tab.active {
      color: var(--text-primary);
    }
    .profile-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent);
    }
    .profile-content {
      padding: 60px 5%;
      max-width: 1000px;
      margin: 0 auto;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state i {
      font-size: 3rem;
      margin-bottom: 20px;
      display: block;
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="/" class="nav-logo">BERLIN<span class="logo-accent">KONUŞUYOR</span></a>
    <div class="nav-right">
      <a href="/" class="nav-login-btn magnetic-btn">Anasayfa</a>
    </div>
  </nav>

  <section class="profile-hero">
    <div id="profileAvatar" class="profile-avatar-large">BK</div>
    <h1 id="userName" class="profile-name">Yükleniyor...</h1>
    <p id="userEmail" class="profile-email">---</p>
    <div id="gamificationContainer" style="margin-bottom: 25px; display: flex; justify-content: center;"></div>

    <button class="action-btn" data-action="logout" style="margin-top: -15px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid var(--border); padding: 8px 20px; border-radius: 20px; cursor: pointer; color: var(--text-secondary); background: transparent;">
      <i class="fas fa-sign-out-alt"></i> Çıkış Yap
    </button>

    <div class="profile-tabs">
      <div class="profile-tab active" data-action="switch-tab" data-tab="bookmarks">Favorilerim</div>
      <div class="profile-tab" data-action="switch-tab" data-tab="my-posts">Paylaşımlarım</div>
    </div>
  </section>

  <section class="profile-content">
    <div id="tabContent">
      <div class="empty-state">
        <i class="fas fa-bookmark"></i>
        <p>Yükleniyor...</p>
      </div>
    </div>
  </section>

  <script type="module" src="/src/features/profile.js"></script>
</body>
</html>
