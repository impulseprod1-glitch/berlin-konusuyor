<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli | Berlin Konuşuyor</title>
    <link rel="stylesheet" href="src/style.css">
    <style>
        :root {
            --admin-bg: #050505;
            --admin-card: #111111;
        }
        body.admin-body {
            background: var(--admin-bg);
            color: #fff;
            padding: 40px;
            font-family: 'Inter', sans-serif;
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
        
        .admin-card {
            background: var(--admin-card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #222;
        }
        .admin-card h2 { margin-top: 0; color: var(--accent); margin-bottom: 24px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaa; }
        input, textarea, select {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button.admin-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        .admin-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-box {
            background: #111;
            padding: 20px;
            border-radius: 12px;
            flex: 1;
            text-align: center;
        }
        .stat-num { font-size: 2rem; font-weight: 800; color: var(--accent); }
        .export-section { margin-top: 40px; text-align: center; }
        .export-btn { background: #333; color: #fff; border: 1px solid #444; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body class="admin-body">
    <div class="admin-header">
        <h1>Berlin Konuşuyor <span style="color:var(--accent)">Admin</span></h1>
        <a href="/" style="color:#aaa; text-decoration:none">← Siteye Dön</a>
    </div>

    <div class="admin-stats">
        <div class="stat-box">
            <div class="stat-num" id="statNews">0</div>
            <div>Haber</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="statEvents">0</div>
            <div>Etkinlik</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="statSubs">0</div>
            <div>Abone</div>
        </div>
    </div>

    <div class="admin-grid">
        <!-- Haber Ekleme -->
        <div class="admin-card">
            <h2>Yeni Haber Ekle</h2>
            <form id="addNewsForm">
                <div class="form-group">
                    <label>Başlık</label>
                    <input type="text" id="newsTitle" required>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="newsCat">
                        <option value="Güncel">Güncel</option>
                        <option value="Yaşam">Yaşam</option>
                        <option value="Ekonomi">Ekonomi</option>
                        <option value="Kültür">Kültür</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kaynak</label>
                    <input type="text" id="newsSource">
                </div>
                <div class="form-group">
                    <label>Görsel URL</label>
                    <input type="text" id="newsImg" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>İçerik/Özet (TR)</label>
                    <textarea id="newsSummary" rows="4"></textarea>
                </div>
                <button type="submit" class="admin-btn">Haberi Yayınla</button>
            </form>
        </div>

        <!-- Etkinlik Ekleme -->
        <div class="admin-card">
            <h2>Yeni Etkinlik Ekle</h2>
            <form id="addEventForm">
                <div class="form-group">
                    <label>Etkinlik Adı</label>
                    <input type="text" id="eventTitle" required>
                </div>
                <div class="form-group">
                    <label>Tarih</label>
                    <input type="date" id="eventDate">
                </div>
                <div class="form-group">
                    <label>Mekan</label>
                    <input type="text" id="eventVenue">
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <input type="text" id="eventCat">
                </div>
                <button type="submit" class="admin-btn">Etkinliği Kaydet</button>
            </form>
        </div>
    </div>

    <div class="export-section">
        <button class="export-btn" id="exportData">Verileri JSON Olarak İndir (Yedek)</button>
    </div>

    <script>
        // Basit Admin Logic
        const updateStats = () => {
            const news = JSON.parse(localStorage.getItem('bk_custom_news') || '[]');
            const events = JSON.parse(localStorage.getItem('bk_custom_events') || '[]');
            const subs = JSON.parse(localStorage.getItem('bk_subscribers') || '[]');
            
            document.getElementById('statNews').textContent = news.length;
            document.getElementById('statEvents').textContent = events.length;
            document.getElementById('statSubs').textContent = subs.length;
        };

        document.getElementById('addNewsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const news = JSON.parse(localStorage.getItem('bk_custom_news') || '[]');
            news.push({
                id: Date.now(),
                title: document.getElementById('newsTitle').value,
                category: document.getElementById('newsCat').value,
                source: document.getElementById('newsSource').value || 'Berlin Konuşuyor',
                image: document.getElementById('newsImg').value || 'https://images.unsplash.com/photo-1560969184-10fe8719e047?auto=format&fit=crop&w=800',
                summary_tr: document.getElementById('newsSummary').value,
                date: new Date().toISOString()
            });
            localStorage.setItem('bk_custom_news', JSON.stringify(news));
            alert('Haber başarıyla eklendi! Ana sayfada görünecektir.');
            e.target.reset();
            updateStats();
        });

        document.getElementById('addEventForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const events = JSON.parse(localStorage.getItem('bk_custom_events') || '[]');
            events.push({
                id: Date.now(),
                title: document.getElementById('eventTitle').value,
                date: document.getElementById('eventDate').value,
                venue: document.getElementById('eventVenue').value,
                category: document.getElementById('eventCat').value
            });
            localStorage.setItem('bk_custom_events', JSON.stringify(events));
            alert('Etkinlik başarıyla eklendi!');
            e.target.reset();
            updateStats();
        });

        document.getElementById('exportData').addEventListener('click', () => {
            const data = {
                news: JSON.parse(localStorage.getItem('bk_custom_news') || '[]'),
                events: JSON.parse(localStorage.getItem('bk_custom_events') || '[]'),
                subscribers: JSON.parse(localStorage.getItem('bk_subscribers') || '[]')
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'berlin_konusuyor_backup.json';
            a.click();
        });

        updateStats();
    </script>
</body>
</html>
